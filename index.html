<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Browser Nap & Drowsiness Alert</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="warning.png" />

  <!-- MediaPipe Face Mesh CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1e29, #0a0c10);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
      overflow-x: hidden;
    }

    h2 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      margin-bottom: 20px;
      text-align: center;
      font-weight: 700;
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    /* Video Container - Fully Responsive Aspect Ratio */
    #container {
      position: relative;
      width: 100%;
      max-width: 680px;
      aspect-ratio: 4 / 3;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
      background-color: #12141c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror camera */
    }

    /* Status Bar with Enlarged Blinking Pulse Indicator */
    #status-wrapper {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 90vw;
    }

    #status-box {
      font-size: clamp(0.95rem, 3vw, 1.25rem);
      font-weight: 600;
      letter-spacing: 0.2px;
      text-align: center;
    }

    /* Prominent Green Pulse Rings */
    .pulse-container {
      position: relative;
      width: 24px;
      height: 24px;
      display: none;
      flex-shrink: 0;
    }

    .pulse-dot {
      width: 14px;
      height: 14px;
      background-color: #30d158;
      border-radius: 50%;
      position: absolute;
      top: 5px;
      left: 5px;
      box-shadow: 0 0 10px #30d158;
    }

    .pulse-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 24px;
      height: 24px;
      border: 2.5px solid #30d158;
      border-radius: 50%;
      animation: pulse 1.6s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
      opacity: 0;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.4);
        opacity: 1;
      }
      100% {
        transform: scale(2.4);
        opacity: 0;
      }
    }

    /* Fullscreen Red Alert Overlay */
    #alert-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle, rgba(255, 59, 48, 0.95) 0%, rgba(180, 0, 0, 0.98) 100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      text-align: center;
      animation: flash 0.6s infinite alternate ease-in-out;
    }

    @keyframes flash {
      from { opacity: 0.85; transform: scale(1); }
      to { opacity: 1; transform: scale(1.02); }
    }

    #alert-overlay h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      margin-bottom: 12px;
      color: #ffffff;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      font-weight: 900;
      letter-spacing: 1px;
    }

    #alert-overlay p {
      font-size: clamp(1rem, 3.5vw, 1.5rem);
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 24px;
      max-width: 500px;
    }

    button {
      padding: 14px 32px;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 700;
      background-color: #ffffff;
      color: #ff3b30;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: all 0.2s ease;
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <h2>Real-Time Nap Alert System</h2>

  <div id="container">
    <video id="webcam" autoplay playsinline></video>
  </div>

  <div id="status-wrapper">
    <div id="pulse-indicator" class="pulse-container">
      <div class="pulse-dot"></div>
      <div class="pulse-ring"></div>
    </div>
    <div id="status-box">Status: Initializing Camera...</div>
  </div>

  <!-- Red Fullscreen Warning Overlay -->
  <div id="alert-overlay">
    <h1>🚨 WAKE UP! 🚨</h1>
    <p>You have been asleep for more than 5 seconds!</p>
    <button onclick="dismissAlert()">I'm Awake!</button>
  </div>

  <script>
    const videoElement = document.getElementById('webcam');
    const statusBox = document.getElementById('status-box');
    const alertOverlay = document.getElementById('alert-overlay');
    const pulseIndicator = document.getElementById('pulse-indicator');

    let closedStartTime = null;
    const NAP_THRESHOLD_MS = 5000; // 5 Seconds
    let alertTriggered = false;

    // Web Audio API Synth Siren
    let audioCtx = null;
    let oscillator = null;

    // Request System Notification Permission
    if ("Notification" in window) {
      if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
      }
    }

    function sendSystemNotification() {
      if ("Notification" in window && Notification.permission === "granted") {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        new Notification("Drowsiness Alert!", {
          body: `At this time, you took a nap: ${timestamp}`,
          tag: "nap-alert"
        });
      }
    }

    function playRedAlertSound() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (oscillator) return;

      oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = 'sawtooth';
      oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
      oscillator.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.3);
      
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();

      setInterval(() => {
        if (oscillator && audioCtx) {
          oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
          oscillator.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.3);
        }
      }, 400);
    }

    function stopRedAlertSound() {
      if (oscillator) {
        oscillator.stop();
        oscillator.disconnect();
        oscillator = null;
      }
    }

    // Euclidean distance calculation
    function getDistance(p1, p2) {
      return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    // Eye Aspect Ratio calculation
    function calculateEAR(landmarks, eyeIndices) {
      const p1 = landmarks[eyeIndices[0]];
      const p2 = landmarks[eyeIndices[1]];
      const p3 = landmarks[eyeIndices[2]];
      const p4 = landmarks[eyeIndices[3]];
      const p5 = landmarks[eyeIndices[4]];
      const p6 = landmarks[eyeIndices[5]];

      const vertical1 = getDistance(p2, p6);
      const vertical2 = getDistance(p3, p5);
      const horizontal = getDistance(p1, p4);

      if (horizontal === 0) return 0;
      return (vertical1 + vertical2) / (2.0 * horizontal);
    }

    // MediaPipe Landmark Indices for Both Eyes
    const LEFT_EYE = [362, 385, 387, 263, 373, 380];
    const RIGHT_EYE = [33, 160, 158, 133, 153, 144];

    // MediaPipe Iris Landmarks (Iris points refine exact open state)
    const LEFT_IRIS = [474, 475, 476, 477];
    const RIGHT_IRIS = [469, 470, 471, 472];

    function isIrisVisible(landmarks, irisIndices, eyeIndices) {
      const eyeTop = landmarks[eyeIndices[1]];
      const eyeBottom = landmarks[eyeIndices[5]];
      const eyeHeight = getDistance(eyeTop, eyeBottom);

      // If vertical eyelid gap is extremely narrow (< 1.5 pixels relative), iris is hidden
      return eyeHeight > 0.008;
    }

    function onResults(results) {
      if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        statusBox.innerText = "Status: No face detected";
        pulseIndicator.style.display = 'none';
        closedStartTime = null;
        return;
      }

      const landmarks = results.multiFaceLandmarks[0];

      // Calculate EAR for both left and right eyes
      const leftEAR = calculateEAR(landmarks, LEFT_EYE);
      const rightEAR = calculateEAR(landmarks, RIGHT_EYE);

      // Check if iris is visible in either eye
      const leftIrisVisible = isIrisVisible(landmarks, LEFT_IRIS, LEFT_EYE);
      const rightIrisVisible = isIrisVisible(landmarks, RIGHT_IRIS, RIGHT_EYE);

      // Max EAR ensures that if AT LEAST ONE EYE is partially open (>10%), user is awake
      const maxEAR = Math.max(leftEAR, rightEAR);
      const irisOpen = leftIrisVisible || rightIrisVisible;

      // Lower EAR threshold (0.15) accommodates downward gaze angles (pic1 & pic4)
      const STRICT_CLOSED_THRESHOLD = 0.15;

      const isEyesClosed = (maxEAR < STRICT_CLOSED_THRESHOLD) && !irisOpen;

      if (isEyesClosed) {
        pulseIndicator.style.display = 'none';

        if (!closedStartTime) {
          closedStartTime = Date.now();
        }

        const elapsed = Date.now() - closedStartTime;
        const secondsLeft = Math.max(0, (NAP_THRESHOLD_MS - elapsed) / 1000).toFixed(1);

        statusBox.innerText = `Status: Eyes Closed! Warning in ${secondsLeft}s`;

        if (elapsed >= NAP_THRESHOLD_MS && !alertTriggered) {
          alertTriggered = true;
          alertOverlay.style.display = 'flex';
          playRedAlertSound();
          sendSystemNotification();
        }
      } else {
        // Eyes open or partially visible -> Keep awake status
        closedStartTime = null;
        if (!alertTriggered) {
          pulseIndicator.style.display = 'block';
          statusBox.innerText = "Status: Awake & Working";
        }
      }
    }

    function dismissAlert() {
      alertTriggered = false;
      alertOverlay.style.display = 'none';
      stopRedAlertSound();
      closedStartTime = null;
      pulseIndicator.style.display = 'block';
      statusBox.innerText = "Status: Awake & Working";
    }

    // Initialize MediaPipe FaceMesh
    const faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true, // Enables high-precision 478 landmark mesh including irises
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await faceMesh.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });

    camera.start();
  </script>
</body>
</html>
